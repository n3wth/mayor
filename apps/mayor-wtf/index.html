<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mayor.wtf</title>
<meta name="description" content="The Office of The Mayor.">
<meta name="theme-color" content="#000000">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="/fonts.css">
<style>
  :root {
    --y: #f2e437;
    --k: #0a0a0a;
    --w: #ffffff;
    --display: "Display", "Arial Narrow Bold", "Arial Narrow", sans-serif;
    --mono: "Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--k); color: var(--y); overflow: hidden; }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    cursor: crosshair;
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }

  /* The whole viewport is a yellow plane. MAYOR + objects punch black holes.
     One cutout per session today, one per citizen. Organic placement. */
  .field { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .field svg { display: block; width: 100%; height: 100%; }

  .sparks { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .spark {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    will-change: transform, opacity;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  /* The CTA — lowercase bold white at the bottom (original). */
  .cta {
    position: absolute;
    left: 50%;
    bottom: clamp(40px, 6vh, 64px);
    transform: translateX(-50%);
    pointer-events: auto;
    font-family: var(--sans);
    font-weight: 700;
    font-size: clamp(13px, 1.3vw, 16px);
    letter-spacing: 0;
    text-transform: lowercase;
    color: var(--w);
    text-decoration: none;
    z-index: 11;
    transition: opacity .25s ease;
    opacity: 0.92;
  }
  .cta:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  /* HUD: implicit. n3wth.com only. */
  .hud {
    position: absolute;
    top: clamp(20px, 4vw, 32px);
    right: clamp(20px, 4vw, 32px);
    font-family: var(--sans);
    font-weight: 700;
    font-size: clamp(11px, 1vw, 13px);
    text-transform: lowercase;
    color: var(--w);
    pointer-events: auto;
    z-index: 10;
    opacity: 0.7;
  }
  .hud a { color: inherit; text-decoration: none; }
  .hud a:hover { text-decoration: underline; text-underline-offset: 4px; opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage">

  <div class="field" aria-hidden="true">
    <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
      <defs>
        <mask id="cutout" maskUnits="userSpaceOnUse" x="0" y="0" width="1600" height="1000">
          <rect x="0" y="0" width="1600" height="1000" fill="white"/>

          <!-- MAYOR — the only typographic statement. Knockout. -->
          <text id="mayor-text"
                font-family="Display, Arial Narrow Bold, sans-serif"
                font-weight="900"
                font-size="420"
                text-anchor="middle"
                x="800" y="600"
                letter-spacing="-14"
                fill="black">MAYOR</text>

          <!-- Object pool: motion.js populates these dynamically based on stats.
               Each cutout = one session or citizen. -->
          <g id="objects"></g>
        </mask>
      </defs>

      <rect x="0" y="0" width="1600" height="1000" fill="var(--y)" mask="url(#cutout)"/>
    </svg>
  </div>

  <div class="sparks" data-sparks aria-hidden="true"></div>

  <a class="cta" href="mailto:um@mayor.wtf">um@mayor.wtf</a>

  <div class="hud">
    <a href="https://n3wth.com">n3wth.com</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<script type="module">
  import { initMotion } from "/motion.js";
  const ready = () => (window.gsap ? initMotion(window.gsap) : requestAnimationFrame(ready));
  ready();
</script>

</body>
</html>
