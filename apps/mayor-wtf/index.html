<!doctype html>

<style>
  :root {
    --y: #f0d72a;
    --y-warm: #ffd54a;
    --k: #050505;
    --w: #ffffff;
    --display: "Display", "Arial Narrow Bold", "Arial Narrow", sans-serif;
    --mono: "Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--k); color: var(--w); overflow: hidden; }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }

  .stage { position: fixed; inset: 0; overflow: hidden; }

  /* Volumetric yellow field — the room's atmosphere. */
  .field { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .field canvas { display: block; width: 100%; height: 100%; }

  /* Soft top vignette so chrome reads. */
  .wash {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(120% 60% at 50% 0%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.85) 100%),
      radial-gradient(70% 50% at 50% 50%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.45) 100%);
  }

  /* Aurora curtains — slow vertical yellow gauze ribbons drifting downward.
     Sits between .wash (z:1) and .stars (z:2). DOM order after .wash so it
     paints over the vignette but below the stars. */
  .aurora { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .aurora canvas { display: block; width: 100%; height: 100%; mix-blend-mode: screen; }

  /* Presence stars — soft drifting points of light, one per visitor. */
  .stars { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .stars canvas { display: block; width: 100%; height: 100%; }

  /* Hero MAYOR — yellow on black, breathing, weighty. */
  .hero {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
    perspective: 1600px;
    perspective-origin: 50% 50%;
  }
  .hero .layer {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    will-change: transform;
    transform-style: preserve-3d;
  }
  .ml { transform-box: fill-box; transform-origin: 50% 60%; will-change: transform; cursor: pointer; pointer-events: auto; }
  .hero svg { width: min(96vw, 1500px); height: auto; overflow: visible; }
  .hero .layer text {
    font-family: var(--display);
    font-weight: 900;
    text-anchor: middle;
    letter-spacing: -0.04em;
  }
  .hero .layer.back text {
    fill: var(--y-warm);
    filter: blur(40px);
    opacity: 0.45;
  }
  .hero .layer.mid text { fill: var(--y); }
  .hero .layer.mid svg {
    filter:
      drop-shadow(0px 4px 0 rgba(0,0,0,0.35))
      drop-shadow(0px 26px 36px rgba(0,0,0,0.55));
  }

  /* Cursor trail — soft yellow particles drifting behind the pointer. */
  .trail { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .trail canvas { display: block; width: 100%; height: 100%; }

  /* Note ripples (synced) — concentric expanding rings drawn on click anywhere. */
  .ripples { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .ripples canvas { display: block; width: 100%; height: 100%; }

  /* Cursor */
  .cursor-halo, .cursor-dot {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 50;
    transform: translate3d(-100px, -100px, 0);
    will-change: transform;
  }
  .cursor-halo {
    width: 60px; height: 60px;
    margin: -30px 0 0 -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,215,42,0.32) 0%, rgba(240,215,42,0) 70%);
    mix-blend-mode: screen;
  }
  .cursor-dot {
    width: 4px; height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
  }

  /* Two corners only — domain & link. Implicit. */
  .corner {
    position: absolute;
    z-index: 12;
    pointer-events: auto;
    font-family: var(--mono);
    font-size: clamp(10px, 0.95vw, 11.5px);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .corner.tl { top: clamp(20px, 3vw, 28px); left: clamp(22px, 3vw, 32px); }
  .corner.tr { top: clamp(20px, 3vw, 28px); right: clamp(22px, 3vw, 32px); }
  .corner.bl { bottom: clamp(22px, 3vw, 30px); left: clamp(22px, 3vw, 32px); }
  .corner.br { bottom: clamp(22px, 3vw, 30px); right: clamp(22px, 3vw, 32px); }
  .corner a { color: rgba(255,255,255,0.65); text-decoration: none; transition: color .25s ease; }
  .corner a:hover { color: var(--w); }
  .corner .live {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--y);
    box-shadow: 0 0 8px var(--y);
    margin-right: 8px;
    vertical-align: 0;
    animation: blink 2.6s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* CTA — the only call to action. Quiet, in glass. */
  .cta {
    position: absolute;
    left: 50%;
    bottom: clamp(38px, 6vh, 64px);
    transform: translateX(-50%);
    z-index: 12;
    pointer-events: auto;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 13px 24px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(13px, 1.1vw, 15px);
    color: var(--w);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    background: rgba(8,8,10,0.45);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.85);
    transition: transform .5s cubic-bezier(.2,.8,.2,1), border-color .4s ease;
  }
  .cta:hover { transform: translateX(-50%) translateY(-1px); border-color: rgba(240,215,42,0.5); }
  .cta .pin {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--y);
    box-shadow: 0 0 14px var(--y);
  }

  /* Step sequencer — 5 rows × 16 cells, one per MAYOR letter.
     The instrument itself. Everyone in the room edits the same grid. */
  .seq {
    position: absolute;
    left: 50%;
    bottom: clamp(96px, 14vh, 150px);
    transform: translateX(-50%);
    z-index: 14;
    pointer-events: auto;
    display: grid;
    grid-template-columns: 22px repeat(16, 1fr);
    grid-auto-rows: clamp(16px, 2.4vw, 22px);
    gap: clamp(2px, 0.4vw, 4px);
    padding: 10px clamp(12px, 1.6vw, 18px);
    border-radius: 12px;
    background: rgba(8,8,10,0.55);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.85);
    width: min(86vw, 720px);
  }
  .seq .head {
    grid-column: 2 / -1;
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: clamp(2px, 0.4vw, 4px);
    height: 4px;
  }
  .seq .head span {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    transition: background .12s ease, box-shadow .12s ease;
  }
  .seq .head span.beat { background: rgba(255,255,255,0.18); }
  .seq .head span.now { background: var(--y); box-shadow: 0 0 6px var(--y); }
  .seq .label {
    font-family: var(--display);
    font-weight: 900;
    font-size: clamp(13px, 1.3vw, 16px);
    color: var(--y);
    text-align: center;
    align-self: center;
    line-height: 1;
  }
  .seq .cell {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    padding: 0;
    transition: background .1s ease, transform .12s ease, box-shadow .15s ease;
  }
  .seq .cell:hover { background: rgba(255,255,255,0.10); }
  .seq .cell.on {
    background: var(--y);
    border-color: var(--y);
    box-shadow: 0 0 8px rgba(240,215,42,0.5);
  }
  .seq .cell.now {
    transform: scale(1.15);
    box-shadow: 0 0 12px rgba(255,255,255,0.45);
  }
  @media (max-width: 700px) {
    .seq { width: 94vw; padding: 6px 8px; }
  }

  /* Chronicle — the real Mayor's recent activity, surfacing as a quiet
     line at the top of the page. Implicit. Updates every minute. */
  .chronicle {
    position: fixed;
    top: clamp(48px, 6vw, 64px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 14;
    pointer-events: none;
    font-family: var(--mono);
    font-size: clamp(10px, 0.95vw, 11px);
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    transition: opacity .8s ease;
    opacity: 0;
    max-width: 90vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chronicle.shown { opacity: 1; }
  .chronicle .accent { color: rgba(255, 220, 80, 0.7); }

  /* TUNNEL — full-screen 3D world overlay. Hidden by default. When active,
     it covers the page; the room behind dims to ~5%. Built on three.js. */
  .tunnel {
    position: fixed;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s cubic-bezier(.2,.8,.2,1);
    background: #000;
  }
  .tunnel.active { opacity: 1; pointer-events: auto; }
  .tunnel canvas { display: block; width: 100%; height: 100%; }
  .tunnel .scene-tag {
    position: absolute;
    top: clamp(20px, 4vw, 36px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 220, 80, 0.85);
    font-family: var(--mono);
    font-size: clamp(10px, 1vw, 12px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(255, 200, 60, 0.6);
    pointer-events: none;
  }
  .tunnel .esc-hint {
    position: absolute;
    bottom: clamp(20px, 4vw, 36px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    pointer-events: none;
  }
  /* Dim the rest of the page when tunnel is active */
  body.tunneling .stage { opacity: 0.05; transition: opacity 1s ease; }

  /* Sound chip — one tiny invitation, bottom-right. */
  .sound {
    position: absolute;
    bottom: clamp(38px, 6vh, 64px);
    right: clamp(22px, 3vw, 32px);
    z-index: 12;
    pointer-events: auto;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(8,8,10,0.45);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.65);
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color .3s ease, border-color .3s ease;
  }
  .sound:hover { color: var(--w); border-color: rgba(255,255,255,0.32); }
  .sound.on { color: var(--y); border-color: rgba(240,215,42,0.45); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    body { cursor: auto; }
    .cursor-halo, .cursor-dot { display: none; }
  }
  @media (max-width: 700px) {
    body { cursor: auto; }
    .cursor-halo, .cursor-dot { display: none; }
    .corner.bl, .corner.br { display: none; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Atmosphere -->
  <div class="field" aria-hidden="true"><canvas data-field></canvas></div>
  <div class="wash" aria-hidden="true"></div>

  <!-- Aurora curtains -->
  <div class="aurora" aria-hidden="true"><canvas data-aurora></canvas></div>

  <!-- Presence stars -->
  <div class="stars" aria-hidden="true"><canvas data-stars></canvas></div>

  <!-- Cursor trail -->
  <div class="trail" aria-hidden="true"><canvas data-trail></canvas></div>

  <!-- Note ripples -->
  <div class="ripples" aria-hidden="true"><canvas data-ripples></canvas></div>

  <!-- Hero -->
  <div class="hero" aria-label="Mayor">
    <div class="layer back" data-layer="back">
      <svg viewBox="0 0 1500 480" preserveAspectRatio="xMidYMid meet">
        <text x="750" y="380" font-size="440" letter-spacing="-18">MAYOR</text>
      </svg>
    </div>
    <div class="layer mid" data-layer="mid">
      <svg viewBox="0 0 1500 480" preserveAspectRatio="xMidYMid meet">
        <g id="mayor-letters" font-family="Display, Arial Narrow Bold, sans-serif"
                              font-weight="900" font-size="440" text-anchor="middle">
          <text class="ml" data-letter="M" x="180"  y="380">M</text>
          <text class="ml" data-letter="A" x="465"  y="380">A</text>
          <text class="ml" data-letter="Y" x="750"  y="380">Y</text>
          <text class="ml" data-letter="O" x="1035" y="380">O</text>
          <text class="ml" data-letter="R" x="1320" y="380">R</text>
        </g>
      </svg>
    </div>
  </div>

  <!-- Corners -->
  <div class="corner tl"><span class="live"></span><span data-presence>connecting</span></div>
  <div class="corner tr"><a href="https://n3wth.com">n3wth.com</a></div>

  <!-- Step sequencer — built by motion.js once the page is alive -->
  <div class="seq" data-seq aria-label="Mayor sequencer"></div>

  <!-- CTA -->
  <a class="cta" href="mailto:um@mayor.wtf">
    <span class="pin"></span>
    <span>um@mayor.wtf</span>
  </a>

  <!-- Sound -->
  <button class="sound" data-sound>🔇 sound</button>

  <!-- Cursor -->
  <div class="cursor-halo" data-cursor-halo aria-hidden="true"></div>
  <div class="cursor-dot" data-cursor-dot aria-hidden="true"></div>

</div>

<!-- Chronicle of the mayor's actual recent work -->
<div class="chronicle" data-chronicle aria-hidden="true"></div>

<!-- 3D tunnel overlay. Sits outside .stage so the dim doesn't cascade. -->
<div class="tunnel" data-tunnel aria-hidden="true">
  <canvas data-tunnel-canvas></canvas>
  <div class="scene-tag" data-tunnel-tag></div>
  <div class="esc-hint">esc to return</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/tone@15.0.4/build/Tone.js" defer></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
    "postprocessing": "https://cdn.jsdelivr.net/npm/postprocessing@6.36.4/build/postprocessing.esm.js"
  }
}
</script>
<script type="module">
  import { initMotion } from "/motion.js";
  const ready = () => (window.gsap ? initMotion(window.gsap) : requestAnimationFrame(ready));
  ready();
</script>

</body>
</html>
