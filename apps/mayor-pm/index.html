<style>
  :root {
    --y: #f2e437;
    --k: #0a0a0a;
    --display: "Display", "Arial Narrow Bold", "Arial Narrow", sans-serif;
    --mono: "Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--k); color: var(--y); overflow: hidden; }
  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    cursor: crosshair;
  }

  /* Stage holds everything. Three z-layers: shapes (bg), MAYOR (mid), HUD (front). */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
  }

  /* The shape canvas — yellow geometric primitives that pulse and drift. */
  .shapes {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .shapes svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .shape { will-change: transform, opacity; }

  /* The MAYOR word, centered. */
  .mayor-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .mayor-wrap svg {
    width: 92%;
    height: auto;
    max-height: 70vh;
    overflow: visible;
  }
  .mayor-wrap svg text {
    font-family: var(--display);
    font-weight: 900;
    fill: var(--y);
  }

  /* HUD — the only chrome. Top corner labels. */
  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  .hud .label {
    position: absolute;
    font-family: var(--mono);
    font-size: clamp(10px, 1.1vw, 12px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--y);
    opacity: 0.7;
  }
  .hud .tl { top: clamp(20px, 4vw, 40px); left: clamp(20px, 4vw, 40px); }
  .hud .tr { top: clamp(20px, 4vw, 40px); right: clamp(20px, 4vw, 40px); }
  .hud .bl { bottom: clamp(20px, 4vw, 40px); left: clamp(20px, 4vw, 40px); }
  .hud .br { bottom: clamp(20px, 4vw, 40px); right: clamp(20px, 4vw, 40px); pointer-events: auto; }
  .hud a { color: var(--y); text-decoration: none; pointer-events: auto; opacity: 0.7; transition: opacity .2s; }
  .hud a:hover { opacity: 1; }

  .hud .hb {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--y);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Shape layer -->
  <div class="shapes" aria-hidden="true">
    <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
      <!-- Yellow shapes that animate. Sized in viewBox units. -->
      <g class="shape s1"><circle cx="220" cy="180" r="60" fill="var(--y)"/></g>
      <g class="shape s2"><circle cx="1380" cy="220" r="90" fill="var(--y)"/></g>
      <g class="shape s3"><rect x="80" y="780" width="180" height="14" fill="var(--y)"/></g>
      <g class="shape s4"><rect x="1300" y="820" width="220" height="14" fill="var(--y)"/></g>
      <g class="shape s5"><polygon points="800,80 830,140 770,140" fill="var(--y)"/></g>
      <g class="shape s6"><circle cx="120" cy="500" r="14" fill="var(--y)"/></g>
      <g class="shape s7"><circle cx="1480" cy="540" r="14" fill="var(--y)"/></g>
      <g class="shape s8"><rect x="780" y="900" width="40" height="40" fill="var(--y)"/></g>
      <g class="shape s9"><circle cx="400" cy="900" r="6" fill="var(--y)"/></g>
      <g class="shape s10"><circle cx="1200" cy="900" r="6" fill="var(--y)"/></g>
      <g class="shape s11"><rect x="1430" y="430" width="100" height="2" fill="var(--y)"/></g>
      <g class="shape s12"><rect x="70" y="430" width="100" height="2" fill="var(--y)"/></g>
      <g class="shape s13"><circle cx="800" cy="940" r="3" fill="var(--y)"/></g>
      <g class="shape s14"><polygon points="200,920 230,920 215,940" fill="var(--y)"/></g>
      <g class="shape s15"><polygon points="1380,920 1410,920 1395,940" fill="var(--y)"/></g>
    </svg>
  </div>

  <!-- MAYOR -->
  <h1 class="mayor-wrap" aria-label="Mayor">
    <svg viewBox="-40 -40 1080 400"
         role="img" aria-hidden="true"
         preserveAspectRatio="xMidYMid meet">
      <g font-size="340" text-anchor="middle">
        <text class="l" x="165" y="270">M</text>
        <text class="l" x="358" y="270">A</text>
        <text class="l" x="525" y="270">Y</text>
        <text class="l" x="695" y="270">O</text>
        <text class="l" x="865" y="270">R</text>
      </g>
    </svg>
  </h1>

  <!-- HUD -->
  <div class="hud">
    <div class="label tl">mayor.wtf</div>
    <div class="label tr"><span class="hb" aria-hidden="true"></span>online</div>
    <div class="label bl">Oliver Newth · Google · SF</div>
    <div class="label br">
      <a href="https://n3wth.com">n3wth.com ↗</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<script type="module">
  import { initMotion } from "/motion.js";
  const ready = () => (window.gsap ? initMotion(window.gsap) : requestAnimationFrame(ready));
  ready();
</script>

</body>
</html>
