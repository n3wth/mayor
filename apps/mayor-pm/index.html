<style>
  :root {
    --bg: #f2e437;
    --ink: #0a0a0a;
    --dim: #4a4418;
    --pad: clamp(20px, 4vw, 56px);
    --mono: "Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --display: "Display", "Arial Narrow", sans-serif;
    --gap-page: clamp(16px, 2vh, 32px);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--ink); }

  body {
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    padding: var(--pad);
    display: grid;
    grid-template-rows: 1fr auto;
    height: 100svh;
    min-height: 520px;
    gap: var(--gap-page);
    overflow: hidden;
  }
  /* Short viewports: allow scroll rather than squishing. */
  @media (max-height: 520px) {
    body { height: auto; min-height: 100vh; overflow: visible; }
  }

  a {
    color: inherit;
    text-decoration: none;
  }
  a:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  .label {
    font-family: var(--mono);
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  main {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    overflow: visible;
  }

  .mayor-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .mayor-wrap svg {
    display: block;
    width: 100%;
    height: auto;
    max-height: 100%;
    overflow: visible;
  }
  .mayor-wrap svg text {
    font-family: var(--display);
    font-weight: 900;
    fill: var(--ink);
  }

  .foot {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(16px, 3vw, 40px);
    align-items: end;
    justify-content: space-between;
  }

  .name {
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(16px, 1.5vw, 20px);
    line-height: 1.3;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(14px, 1.8vw, 24px);
    font-family: var(--sans);
    font-weight: 600;
    font-size: clamp(16px, 1.5vw, 20px);
    line-height: 1.3;
  }
  nav a {
    transition: color 160ms ease;
  }
  nav a:hover { color: var(--dim); }

  @media (max-width: 600px) {
    .foot { flex-direction: column; align-items: flex-start; gap: 20px; }
  }

  /* Reduced-motion users see the final state immediately, no JS motion runs. */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<main>
  <h1 class="mayor-wrap" aria-label="Mayor">
    <svg viewBox="-40 -40 1080 400"
         role="img"
         aria-hidden="true"
         preserveAspectRatio="xMidYMid meet">
      <g font-size="340" text-anchor="middle">
        <text class="l" x="165" y="270">M</text>
        <text class="l" x="358" y="270">A</text>
        <text class="l" x="525" y="270">Y</text>
        <text class="l" x="695" y="270">O</text>
        <text class="l" x="865" y="270">R</text>
      </g>
    </svg>
  </h1>
</main>

<div class="foot">
  <p class="name">A project by Oliver Newth</p>
  <nav aria-label="Elsewhere">
    <a href="https://n3wth.com">n3wth.com</a>
    <a href="https://github.com/n3wth">GitHub</a>
    <a href="https://linkedin.com/in/newth">LinkedIn</a>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
<script type="module">
  import { initMotion } from "/motion.js";
  // gsap.min.js is deferred; wait for it on next tick.
  const ready = () => (window.gsap ? initMotion(window.gsap) : requestAnimationFrame(ready));
  ready();
</script>

</body>
</html>
